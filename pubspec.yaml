name: app_help_center
description: A lightweight Flutter help center and user communication kit for app announcements, changelog, FAQ, support, and rating links.
version: 0.2.0
homepage: https://github.com/yangxuehui/app_help_center
repository: https://github.com/yangxuehui/app_help_center
issue_tracker: https://github.com/yangxuehui/app_help_center/issues
topics:
  - help-center
  - announcements
  - changelog
  - faq
  - support

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

